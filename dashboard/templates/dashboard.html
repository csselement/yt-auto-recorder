<!DOCTYPE html>
<html>
<head>
    <title>Auto Live Recorder Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Radix-inspired dark palette composition:
               gray for neutrals, blue for accent, semantic status scales. */
            --gray-1: #111111;
            --gray-2: #191919;
            --gray-3: #222222;
            --gray-4: #2a2a2a;
            --gray-5: #313131;
            --gray-8: #606060;
            --gray-9: #6e6e6e;
            --gray-11: #b4b4b4;
            --gray-12: #eeeeee;

            --blue-7: #205d9e;
            --blue-8: #2870bd;
            --blue-9: #0090ff;
            --blue-10: #3b9eff;
            --blue-11: #70b8ff;

            --red-7: #8c333a;
            --red-8: #b54548;
            --red-9: #e5484d;
            --red-10: #ec5d5e;
            --red-11: #ff9592;

            --yellow-7: #8f6424;
            --yellow-8: #ab7c2a;
            --yellow-9: #ffe629;
            --yellow-10: #ffff57;

            --orange-7: #8b4c1f;
            --orange-8: #a95c24;
            --orange-9: #f76b15;
            --orange-10: #ff801f;

            --green-7: #2b7a4b;
            --green-8: #2f8c57;
            --green-9: #30a46c;
            --green-10: #3cb179;

            --panel: var(--gray-2);
            --panel-strong: var(--gray-3);
            --border: var(--gray-5);
            --text: var(--gray-12);
            --muted: var(--gray-11);
            --focus: var(--blue-11);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--gray-1);
            color: var(--text);
        }

        main {
            max-width: 980px;
            margin: 0 auto;
        }

        h1 {
            font-family: "Oswald", "Arial Narrow", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0;
            line-height: 1.05;
            margin: 4px 0 22px;
            text-align: center;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .switch {
            display: inline-flex;
            flex: 0 0 auto;
            position: relative;
        }

        .switch input {
            height: 1px;
            opacity: 0;
            position: absolute;
            width: 1px;
        }

        .slider {
            background: var(--gray-8);
            border-radius: 999px;
            cursor: pointer;
            display: block;
            height: 24px;
            position: relative;
            transition: background 0.2s;
            width: 42px;
        }

        .slider::before {
            background: var(--gray-12);
            border-radius: 50%;
            content: "";
            height: 20px;
            left: 2px;
            position: absolute;
            top: 2px;
            transition: transform 0.2s;
            width: 20px;
        }

        .switch input:checked + .slider {
            background: var(--green-8);
        }

        .switch input:checked + .slider::before {
            transform: translateX(18px);
        }

        input {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--panel);
            color: var(--text);
            font-size: 14px;
            padding: 11px 12px;
        }

        .switch input {
            border: 0;
            flex: 0;
            height: 1px;
            min-height: 0;
            min-width: 0;
            opacity: 0;
            padding: 0;
            position: absolute;
            width: 1px;
        }

        button {
            border: 0;
            border-radius: 5px;
            background: var(--blue-8);
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            padding: 0 14px;
            min-height: 42px;
        }

        button:hover {
            background: var(--blue-9);
        }

        .remove {
            align-self: center;
            align-items: center;
            background: var(--gray-8);
            border-radius: 50%;
            color: var(--gray-12);
            display: inline-flex;
            height: 24px;
            justify-content: center;
            margin-left: 0;
            min-height: 24px;
            padding: 0;
            width: 24px;
        }

        .remove:hover {
            background: var(--gray-9);
            text-decoration: none;
        }

        .remove.confirm {
            background: var(--red-9);
            color: white;
        }

        .remove-icon {
            display: block;
            height: 12px;
            position: relative;
            width: 12px;
        }

        .remove-icon::before,
        .remove-icon::after {
            background: currentColor;
            border-radius: 999px;
            content: "";
            height: 2px;
            left: 1px;
            position: absolute;
            top: 5px;
            transform-origin: center;
            width: 10px;
        }

        .remove-icon::before {
            transform: rotate(45deg);
        }

        .remove-icon::after {
            transform: rotate(-45deg);
        }

        .remove.confirm .remove-icon::before {
            height: 8px;
            left: 5px;
            top: 1px;
            transform: none;
            width: 2px;
        }

        .remove.confirm .remove-icon::after {
            height: 2px;
            left: 5px;
            top: 10px;
            transform: none;
            width: 2px;
        }

        .channel-actions {
            align-items: center;
            display: flex;
            flex: 0 0 auto;
            gap: 10px;
            margin-left: auto;
        }

        .message {
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 14px;
        }

        /* Wrapper for left accent */
        .channel-wrapper {
            display: flex;
            margin-bottom: 10px;
        }

        /* Left accent bar */
        .channel-accent {
            width: 8px;
            border-radius: 5px 0 0 5px;
            background-color: var(--gray-4);
            transition: background-color 0.5s;
        }

        /* Main tile content */
        .channel {
            background: var(--panel);
            border-radius: 0 5px 5px 0;
            padding: 13px 16px;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            justify-content: space-between;
        }

        .channel-body {
            min-width: 0;
        }

        .channel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
            word-break: break-word;
        }

        .info {
            font-size: 12px;
            color: var(--muted);
        }

        /* Status colors */
        .live-recording-active {
            animation: redPulse 1.8s ease-in-out infinite;
            background-color: var(--red-9);
        }
        .live-recording-inactive { background-color: var(--red-9); }
        .waiting-recording-active {
            animation: orangePulse 2.2s ease-in-out infinite;
            background-color: var(--orange-9);
        }
        .waiting-recording-inactive { background-color: var(--orange-9); }
        .offline-recording-active { background-color: var(--green-9); }
        .offline-recording-inactive { background-color: var(--yellow-9); }
        .remuxing { background-color: var(--blue-9); }
        .error { background-color: var(--red-9); }
        .never-seen { background-color: var(--gray-8); }

        @keyframes redPulse {
            0%, 100% {
                background-color: var(--red-8);
                box-shadow: 0 0 0 rgba(229, 72, 77, 0);
            }
            50% {
                background-color: var(--red-10);
                box-shadow: 0 0 14px rgba(229, 72, 77, 0.58);
            }
        }

        @keyframes orangePulse {
            0%, 100% {
                background-color: var(--orange-8);
                box-shadow: 0 0 0 rgba(247, 107, 21, 0);
            }
            50% {
                background-color: var(--orange-10);
                box-shadow: 0 0 12px rgba(247, 107, 21, 0.5);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .toolbar {
                flex-direction: column;
            }

            .channel {
                align-items: center;
            }

            .remove {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <main>
        <h1>YouTube Live Recorder</h1>

        <form id="channel-form" class="toolbar">
            <input id="channel-url" type="url" placeholder="https://www.youtube.com/@TheLotRadio" autocomplete="off" required>
            <button type="submit">Add Channel</button>
        </form>

        <div id="message" class="message"></div>
        <div id="channels"></div>
    </main>

    <script>
        const message = document.getElementById("message");
        const pendingRemovals = new Map();

        function setMessage(text, isError = false) {
            message.textContent = text;
            message.style.color = isError ? "#ff9a9a" : "#aaa";
        }

        function createText(tag, className, text) {
            const node = document.createElement(tag);
            node.className = className;
            node.textContent = text;
            return node;
        }

        function accentClass(channel) {
            if (!channel.last_seen) return "never-seen";
            if (channel.status === "recording") {
                return channel.active ? "live-recording-active" : "live-recording-inactive";
            }
            if (channel.status === "live_inactive") return "live-recording-inactive";
            if (channel.status === "monitoring") {
                return channel.active ? "waiting-recording-active" : "waiting-recording-inactive";
            }
            if (channel.status === "offline") {
                return channel.active ? "offline-recording-active" : "offline-recording-inactive";
            }
            return channel.status;
        }

        async function refresh() {
            const response = await fetch("/status");
            const data = await response.json();

            const container = document.getElementById("channels");
            container.innerHTML = "";

            data.forEach(ch => {
                const wrapper = document.createElement("div");
                wrapper.className = "channel-wrapper";

                const accent = document.createElement("div");
                accent.className = "channel-accent " + accentClass(ch);

                const tile = document.createElement("div");
                tile.className = "channel";

                const body = document.createElement("div");
                body.className = "channel-body";
                body.appendChild(createText("div", "channel-title", ch.name || ch.id));

                const info = document.createElement("div");
                info.className = "info";
                info.appendChild(document.createTextNode(`Last seen: ${ch.last_seen || "Never seen"}`));
                body.appendChild(info);

                const removeButton = document.createElement("button");
                removeButton.className = "remove";
                removeButton.type = "button";
                removeButton.title = "Remove channel";
                removeButton.setAttribute("aria-label", `Remove ${ch.name || ch.id}`);
                removeButton.innerHTML = `<span class="remove-icon" aria-hidden="true"></span>`;
                removeButton.addEventListener("click", () => confirmRemoveChannel(ch.url, removeButton));

                const actions = document.createElement("div");
                actions.className = "channel-actions";

                const switchLabel = document.createElement("label");
                switchLabel.className = "switch";
                switchLabel.title = ch.active ? "Rec on" : "Rec off";

                const activeInput = document.createElement("input");
                activeInput.type = "checkbox";
                activeInput.checked = Boolean(ch.active);
                activeInput.setAttribute("aria-label", `${ch.name || ch.id} recording ${ch.active ? "on" : "off"}`);
                activeInput.addEventListener("change", async event => {
                    try {
                        await updateChannelActive(ch.url, event.target.checked);
                    } catch (error) {
                        event.target.checked = !event.target.checked;
                        setMessage(error.message, true);
                    }
                });

                const slider = document.createElement("span");
                slider.className = "slider";
                switchLabel.appendChild(activeInput);
                switchLabel.appendChild(slider);
                actions.appendChild(switchLabel);
                actions.appendChild(removeButton);

                wrapper.appendChild(accent);
                tile.appendChild(body);
                tile.appendChild(actions);
                wrapper.appendChild(tile);
                container.appendChild(wrapper);
            });
        }

        async function updateChannelActive(url, active) {
            const response = await fetch("/channels", {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url, active })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Unable to update channel setting.");

            setMessage(active ? "Recording is on for this channel." : "Recording is off for this channel.");
            await refresh();
        }

        async function addChannel(url) {
            const response = await fetch("/channels", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Unable to add channel.");
            setMessage("Channel added. The recorder will check it on the next scan.");
            await refresh();
        }

        async function removeChannel(url) {
            const response = await fetch("/channels", {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url })
            });
            const data = await response.json();
            if (!response.ok) {
                setMessage(data.error || "Unable to remove channel.", true);
                return;
            }
            setMessage("Channel removed from the watch list. Existing recordings were kept.");
            await refresh();
        }

        function confirmRemoveChannel(url, button) {
            if (pendingRemovals.has(url)) {
                clearTimeout(pendingRemovals.get(url));
                pendingRemovals.delete(url);
                removeChannel(url);
                return;
            }

            button.classList.add("confirm");
            button.title = "Click again to remove";
            setMessage("Click the remove button again to confirm.");

            const timeout = setTimeout(() => {
                pendingRemovals.delete(url);
                button.classList.remove("confirm");
                button.title = "Remove channel";
            }, 5000);
            pendingRemovals.set(url, timeout);
        }

        document.getElementById("channel-form").addEventListener("submit", async event => {
            event.preventDefault();
            const input = document.getElementById("channel-url");
            try {
                await addChannel(input.value);
                input.value = "";
            } catch (error) {
                setMessage(error.message, true);
            }
        });

        setInterval(refresh, 60000);
        refresh();
    </script>
</body>
</html>
