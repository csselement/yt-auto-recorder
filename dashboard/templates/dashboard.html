<!DOCTYPE html>
<html>
<head>
    <title>Auto Live Recorder Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            color: #eee;
        }

        main {
            max-width: 980px;
            margin: 0 auto;
        }

        h1 {
            font-family: "Avenir Next Condensed", "Arial Narrow", "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: 0;
            line-height: 1.05;
            margin: 4px 0 22px;
            text-align: center;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .switch {
            display: inline-flex;
            flex: 0 0 auto;
            position: relative;
        }

        .switch input {
            height: 1px;
            opacity: 0;
            position: absolute;
            width: 1px;
        }

        .slider {
            background: #555;
            border-radius: 999px;
            cursor: pointer;
            display: block;
            height: 24px;
            position: relative;
            transition: background 0.2s;
            width: 42px;
        }

        .slider::before {
            background: #fff;
            border-radius: 50%;
            content: "";
            height: 20px;
            left: 2px;
            position: absolute;
            top: 2px;
            transition: transform 0.2s;
            width: 20px;
        }

        .switch input:checked + .slider {
            background: #00a844;
        }

        .switch input:checked + .slider::before {
            transform: translateX(18px);
        }

        input {
            flex: 1;
            min-width: 0;
            border: 1px solid #333;
            border-radius: 5px;
            background: #181818;
            color: #eee;
            font-size: 14px;
            padding: 11px 12px;
        }

        .switch input {
            border: 0;
            flex: 0;
            height: 1px;
            min-height: 0;
            min-width: 0;
            opacity: 0;
            padding: 0;
            position: absolute;
            width: 1px;
        }

        button {
            border: 0;
            border-radius: 5px;
            background: #2f80ed;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            padding: 0 14px;
            min-height: 42px;
        }

        button:hover {
            background: #3d8df5;
        }

        .remove {
            align-self: center;
            align-items: center;
            background: #2a2020;
            border-radius: 50%;
            color: #ffb3b3;
            display: inline-flex;
            font-size: 19px;
            height: 30px;
            justify-content: center;
            line-height: 1;
            margin-left: 0;
            min-height: 30px;
            padding: 0;
            width: 30px;
        }

        .remove:hover {
            background: #552828;
            text-decoration: none;
        }

        .remove.confirm {
            background: #7a1f2a;
            color: #fff;
        }

        .channel-actions {
            align-items: center;
            display: flex;
            flex: 0 0 auto;
            gap: 10px;
            margin-left: auto;
        }

        .message {
            min-height: 20px;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 14px;
        }

        /* Wrapper for left accent */
        .channel-wrapper {
            display: flex;
            margin-bottom: 10px;
        }

        /* Left accent bar */
        .channel-accent {
            width: 8px;
            border-radius: 5px 0 0 5px;
            background-color: #222;
            transition: background-color 0.5s;
        }

        /* Main tile content */
        .channel {
            background: #1a1a1a;
            border-radius: 0 5px 5px 0;
            padding: 13px 16px;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            justify-content: space-between;
        }

        .channel-body {
            min-width: 0;
        }

        .channel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
            word-break: break-word;
        }

        .info {
            font-size: 12px;
            color: #aaa;
        }

        /* Status colors */
        .recording {
            animation: recordingPulse 1.8s ease-in-out infinite;
            background-color: #ff3838 !important;
        }
        .live-inactive { background-color: #d91f2f !important; }
        .monitoring { background-color: #f2d600 !important; }
        .remuxing { background-color: #0af !important; }
        .offline { background-color: #00cc66 !important; }
        .error { background-color: #f33 !important; }

        @keyframes recordingPulse {
            0%, 100% {
                background-color: #b80024;
                box-shadow: 0 0 0 rgba(255, 56, 56, 0);
            }
            50% {
                background-color: #ff3838;
                box-shadow: 0 0 18px rgba(255, 56, 56, 0.75);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .toolbar {
                flex-direction: column;
            }

            .channel {
                align-items: center;
            }

            .remove {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <main>
        <h1>YouTube Live Recorder</h1>

        <form id="channel-form" class="toolbar">
            <input id="channel-url" type="url" placeholder="https://www.youtube.com/@channel" autocomplete="off" required>
            <button type="submit">Add Channel</button>
        </form>

        <div id="message" class="message"></div>
        <div id="channels"></div>
    </main>

    <script>
        const message = document.getElementById("message");
        const pendingRemovals = new Map();

        function setMessage(text, isError = false) {
            message.textContent = text;
            message.style.color = isError ? "#ff9a9a" : "#aaa";
        }

        function createText(tag, className, text) {
            const node = document.createElement(tag);
            node.className = className;
            node.textContent = text;
            return node;
        }

        function accentClass(channel) {
            if (channel.status === "recording" && channel.active) return "recording";
            if (channel.status === "recording" || channel.status === "live_inactive") return "live-inactive";
            return channel.status;
        }

        async function refresh() {
            const response = await fetch("/status");
            const data = await response.json();

            const container = document.getElementById("channels");
            container.innerHTML = "";

            data.forEach(ch => {
                const wrapper = document.createElement("div");
                wrapper.className = "channel-wrapper";

                const accent = document.createElement("div");
                accent.className = "channel-accent " + accentClass(ch);

                const tile = document.createElement("div");
                tile.className = "channel";

                const body = document.createElement("div");
                body.className = "channel-body";
                body.appendChild(createText("div", "channel-title", ch.name || ch.id));

                const info = document.createElement("div");
                info.className = "info";
                info.appendChild(document.createTextNode(`Last seen: ${ch.last_seen || "Never seen"}`));
                body.appendChild(info);

                const removeButton = document.createElement("button");
                removeButton.className = "remove";
                removeButton.type = "button";
                removeButton.textContent = "x";
                removeButton.title = "Remove channel";
                removeButton.setAttribute("aria-label", `Remove ${ch.name || ch.id}`);
                removeButton.addEventListener("click", () => confirmRemoveChannel(ch.url, removeButton));

                const actions = document.createElement("div");
                actions.className = "channel-actions";

                const switchLabel = document.createElement("label");
                switchLabel.className = "switch";
                switchLabel.title = ch.active ? "Rec on" : "Rec off";

                const activeInput = document.createElement("input");
                activeInput.type = "checkbox";
                activeInput.checked = Boolean(ch.active);
                activeInput.setAttribute("aria-label", `${ch.name || ch.id} recording ${ch.active ? "on" : "off"}`);
                activeInput.addEventListener("change", async event => {
                    try {
                        await updateChannelActive(ch.url, event.target.checked);
                    } catch (error) {
                        event.target.checked = !event.target.checked;
                        setMessage(error.message, true);
                    }
                });

                const slider = document.createElement("span");
                slider.className = "slider";
                switchLabel.appendChild(activeInput);
                switchLabel.appendChild(slider);
                actions.appendChild(switchLabel);
                actions.appendChild(removeButton);

                wrapper.appendChild(accent);
                tile.appendChild(body);
                tile.appendChild(actions);
                wrapper.appendChild(tile);
                container.appendChild(wrapper);
            });
        }

        async function updateChannelActive(url, active) {
            const response = await fetch("/channels", {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url, active })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Unable to update channel setting.");

            setMessage(active ? "Recording starts are on for this channel." : "Recording starts are off for this channel.");
            await refresh();
        }

        async function addChannel(url) {
            const response = await fetch("/channels", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Unable to add channel.");
            setMessage("Channel added. The recorder will check it on the next scan.");
            await refresh();
        }

        async function removeChannel(url) {
            const response = await fetch("/channels", {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url })
            });
            const data = await response.json();
            if (!response.ok) {
                setMessage(data.error || "Unable to remove channel.", true);
                return;
            }
            setMessage("Channel removed from the watch list. Existing recordings were kept.");
            await refresh();
        }

        function confirmRemoveChannel(url, button) {
            if (pendingRemovals.has(url)) {
                clearTimeout(pendingRemovals.get(url));
                pendingRemovals.delete(url);
                removeChannel(url);
                return;
            }

            button.classList.add("confirm");
            button.textContent = "!";
            button.title = "Click again to remove";
            setMessage("Click the remove button again to confirm.");

            const timeout = setTimeout(() => {
                pendingRemovals.delete(url);
                button.classList.remove("confirm");
                button.textContent = "x";
                button.title = "Remove channel";
            }, 5000);
            pendingRemovals.set(url, timeout);
        }

        document.getElementById("channel-form").addEventListener("submit", async event => {
            event.preventDefault();
            const input = document.getElementById("channel-url");
            try {
                await addChannel(input.value);
                input.value = "";
            } catch (error) {
                setMessage(error.message, true);
            }
        });

        setInterval(refresh, 60000);
        refresh();
    </script>
</body>
</html>
